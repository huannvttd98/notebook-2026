<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quên mật khẩu — Memory</title>
  <link rel="stylesheet" href="/auth.css?v=__V__" />
</head>
<body class="auth">
  <main class="auth-card">
    <h1 class="auth-brand">📔 Memory</h1>
    <p class="auth-title">Quên mật khẩu</p>

    <div id="msg" class="auth-msg"></div>

    <form id="forgot-form" autocomplete="on">
      <div class="auth-field">
        <label for="email">Email tài khoản</label>
        <input type="email" id="email" name="email" autocomplete="email"
               autocapitalize="none" spellcheck="false" required />
        <div class="auth-hint">Chúng tôi sẽ gửi link đặt lại mật khẩu tới email này.</div>
      </div>
      <button type="submit" class="auth-btn" id="submit-btn">Gửi link đặt lại</button>
    </form>

    <div class="auth-links">
      <a href="/login.html">Quay lại đăng nhập</a>
    </div>
  </main>
  <script src="/auth.js?v=__V__"></script>
</body>
</html>

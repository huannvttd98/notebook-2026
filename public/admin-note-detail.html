<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết ghi chú — Memory</title>
  <link rel="stylesheet" href="/auth.css?v=__V__" />
</head>
<body class="admin admin-note-page">
  <div class="admin-wrap note-detail-wrap">
    <div class="admin-head note-detail-head">
      <div class="admin-title-block">
        <h1>🗒️ Chi tiết ghi chú</h1>
        <p id="detail-subtitle" class="admin-subtitle">Đang tải nội dung ghi chú...</p>
      </div>
      <nav class="admin-nav" aria-label="Điều hướng chi tiết ghi chú">
        <a id="back-to-notes" href="/admin-notes.html" class="admin-back admin-pill-link admin-pill-link-muted">
          <span class="admin-pill-icon">←</span>
          <span class="admin-pill-text">
            <strong>Quay lại danh sách</strong>
            <small>Về màn quản lý ghi chú</small>
          </span>
        </a>
      </nav>
    </div>

    <section class="note-detail-card">
      <div class="note-detail-meta-grid">
        <div class="note-detail-meta-item">
          <span class="note-detail-label">Chủ ghi chú</span>
          <strong id="note-owner">—</strong>
        </div>
        <div class="note-detail-meta-item">
          <span class="note-detail-label">Ngày tạo</span>
          <strong id="note-created">—</strong>
        </div>
        <div class="note-detail-meta-item">
          <span class="note-detail-label">Cập nhật</span>
          <strong id="note-updated">—</strong>
        </div>
        <div class="note-detail-meta-item">
          <span class="note-detail-label">Chia sẻ</span>
          <strong id="note-share-count">—</strong>
        </div>
      </div>

      <div class="note-detail-main">
        <h2 id="note-title" class="note-detail-title">Đang tải...</h2>
        <div id="note-tags" class="note-detail-tags"></div>
        <div id="note-media" class="note-detail-media" hidden>
          <section id="note-images-wrap" class="note-media-block" hidden>
            <h3 class="note-media-title">Ảnh đính kèm</h3>
            <div id="note-images" class="note-detail-images"></div>
          </section>
          <section id="note-music-wrap" class="note-media-block" hidden>
            <h3 class="note-media-title">Nhạc đính kèm</h3>
            <div id="note-music-player" class="note-detail-music"></div>
          </section>
        </div>
        <pre id="note-content" class="note-detail-content"></pre>
      </div>
    </section>

    <section class="note-detail-card note-history-card">
      <div class="note-history-head">
        <h2 class="note-detail-title note-history-title">🕘 Lịch sử thay đổi</h2>
        <span id="history-count" class="note-detail-tag" hidden>0 lần</span>
      </div>
      <p id="history-status" class="note-history-status">Đang tải lịch sử...</p>
      <ol id="history-list" class="note-history-list"></ol>
    </section>
  </div>

  <script src="/admin-note-detail.js?v=__V__"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />

  <title>Quản lý người dùng — Memory</title>
  <link rel="stylesheet" href="/auth.css?v=__V__" />
</head>
<body class="admin users-page">
  <div class="admin-wrap">
    <div class="admin-head">
      <div class="admin-title-block">
        <h1>👥 Quản lý người dùng</h1>
        <p class="admin-subtitle">Theo dõi tài khoản, trạng thái duyệt và hoạt động gần đây.</p>
      </div>
      <nav class="admin-nav" aria-label="Điều hướng quản trị">
        <a href="/admin-notes.html" class="admin-back admin-pill-link">
          <span class="admin-pill-icon">🗒️</span>

        <a href="/" class="admin-back admin-pill-link admin-pill-link-muted">

            <strong>Về trang Memory</strong>
            <small>Quay lại ứng dụng</small>
          </span>
        </a>
      </nav>
    </div>

    <div id="count" class="admin-count"></div>

    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Tài khoản</th>
            <th>Email</th>
            <th>Trạng thái</th>
            <th>Ngày tạo</th>
            <th>Đăng nhập gần nhất</th>
            <th class="admin-num">Số ghi chú</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="user-rows">
          <tr><td colspan="8" class="admin-empty">Đang tải…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script src="/users.js?v=__V__"></script>

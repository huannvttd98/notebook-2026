<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>!!! </title>
  <link rel="stylesheet" href="/style.css?v=__V__" />
</head>
<body class="app" data-max-mb="__MAX_MB__">
  <!-- Nút mở menu (màn lịch) / nút quay lại (màn chi tiết) — chỉ hiện trên điện thoại -->
  <button type="button" id="menu-toggle" class="menu-toggle" aria-label="Mở menu">☰</button>
  <button type="button" id="back-btn" class="back-btn" aria-label="Quay lại lịch">
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <div id="sidebar-backdrop" class="sidebar-backdrop"></div>

  <!-- ===== Sidebar trái (kiểu Notion) ===== -->
  <aside class="sidebar">
    <div class="sidebar-head">
      <span class="workspace">📔 Nhật ký</span>
    </div>

    <button type="button" id="open-calendar" class="new-note">📅 Lịch tháng</button>
    <a href="/music.html" class="new-note" id="open-music" style="text-decoration:none">🎧 Trang nhạc</a>
    <a href="/users.html" class="new-note" id="open-users" style="text-decoration:none" hidden>👥 Quản lý user</a>
    <a href="/admin-notes.html" class="new-note" id="open-admin-notes" style="text-decoration:none" hidden>🗒️ Quản lý ghi chú</a>
    <button type="button" id="new-note" class="new-note">＋ Trang mới</button>

    <div class="sidebar-search">
      <input type="search" id="search" placeholder="🔍 Tìm kiếm..." />
    </div>

    <div class="sidebar-section-label">Ghi chú</div>
    <nav id="note-list" class="note-list"></nav>

    <div id="share-sidebar-section" hidden>
      <div class="sidebar-section-label">Chia sẻ với</div>
      <div id="user-share-status" class="user-share-status"></div>
      <nav id="sidebar-user-list" class="sidebar-user-list" aria-label="Chia sẻ ghi chú với người dùng"></nav>
    </div>

    <div id="weather" class="weather" title="Thời tiết hiện tại">
      <span class="weather-loading">Đang tải thời tiết…</span>
    </div>

    <div class="sidebar-user">
      <span id="user-name" class="user-name" title="Tài khoản đang đăng nhập"></span>
      <button type="button" id="logout-btn" class="logout-btn" title="Đăng xuất">Đăng xuất</button>
    </div>
  </aside>

  <!-- ===== Lịch tháng (chia 2 cột: lịch | ảnh) ===== -->
  <section id="calendar-view" class="calendar-view" hidden>
    <div class="cal-split">
      <!-- Cột trái: lịch -->
      <div class="cal-left">
        <div class="cal-header">
          <button type="button" id="cal-prev" class="cal-nav" aria-label="Tháng trước">‹</button>
          <h2 id="cal-title" class="cal-title">Tháng</h2>
          <button type="button" id="cal-next" class="cal-nav" aria-label="Tháng sau">›</button>
        </div>
        <div class="cal-weekdays">
          <span>T2</span><span>T3</span><span>T4</span><span>T5</span><span>T6</span><span>T7</span><span>CN</span>
        </div>
        <div id="cal-grid" class="cal-grid"></div>
        <p class="cal-hint muted">Bấm vào ngày có cảm xúc để mở ghi chú.</p>
      </div>

      <!-- Cột phải: ảnh -->
      <div class="cal-right">
        <div class="cover-panel">
          <img id="cover-img" class="cover-img" alt="Ảnh bìa" hidden />
          <div id="cover-placeholder" class="cover-placeholder">🖼️<span>Chưa có ảnh</span></div>
          <!-- Nút tròn tải ảnh ở góc dưới phải -->
          <label class="cover-upload-fab" title="Tải ảnh lên" aria-label="Tải ảnh lên">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            <input type="file" id="cover-input" accept="image/*" hidden />
          </label>
        </div>
        <span id="cover-status" class="cover-status muted"></span>
      </div>
    </div>
  </section>

  <!-- ===== Vùng tài liệu bên phải ===== -->
  <main class="doc" hidden>
    <div class="doc-topbar">
      <span id="doc-crumb" class="doc-crumb">Ghi chú</span>
      <span id="shared-badge" class="shared-badge" hidden></span>
      <span class="doc-tools">
        <span id="save-status" class="save-status"></span>
        <button type="button" id="share-note" class="doc-tool" hidden>👥 Chia sẻ</button>
        <button type="button" id="delete-note" class="doc-tool danger" hidden>🗑 Xóa</button>
      </span>
    </div>

    <div class="doc-scroll">
      <!-- Ảnh bìa full-width (kiểu Notion) — nhiều ảnh thì thành slider -->
      <div id="cover-slider" class="cover-slider">
        <div id="note-images" class="note-cover"></div>
        <button type="button" id="slider-prev" class="slider-arrow prev" aria-label="Ảnh trước">‹</button>
        <button type="button" id="slider-next" class="slider-arrow next" aria-label="Ảnh sau">›</button>
        <div id="slider-dots" class="slider-dots"></div>
      </div>

      <div class="doc-body">
        <input type="hidden" id="entry-id" />
        <input type="text" id="title" class="doc-title" placeholder="Không có tiêu đề" maxlength="200" />

        <button type="button" id="doc-meta-toggle" class="doc-meta-toggle" aria-expanded="false"
                aria-controls="doc-meta" title="Hiện tùy chọn">⚙️ Tùy chọn</button>

        <div class="doc-meta" id="doc-meta" hidden>
          <input type="date" id="entry-date" class="doc-date-input" title="Ngày của ghi chú" />
          <label class="add-image-icon" title="Thêm ảnh bìa" aria-label="Thêm ảnh bìa">
            🖼️
            <input type="file" id="note-image-input" accept="image/*" hidden />
          </label>
          <button type="button" id="music-toggle" class="add-music-icon" title="Thêm nhạc" aria-label="Thêm nhạc">🎵</button>
          <span id="edited-mark" class="doc-date"></span>
          <div id="rating" class="rating" role="radiogroup" aria-label="Cảm xúc">
            <button type="button" class="face" data-value="1" aria-label="Rất buồn">😢</button>
            <button type="button" class="face" data-value="2" aria-label="Buồn">🙁</button>
            <button type="button" class="face" data-value="3" aria-label="Bình thường">😐</button>
            <button type="button" class="face" data-value="4" aria-label="Vui">🙂</button>
            <button type="button" class="face" data-value="5" aria-label="Rất vui">😄</button>
            <button type="button" id="rating-clear" class="rating-clear" title="Xóa cảm xúc">✕</button>
          </div>
          <span id="image-status" class="cover-status muted"></span>
        </div>

        <!-- Dán link YouTube/Spotify để gắn nhạc cho ghi chú -->
        <div id="music-row" class="music-row" hidden>
          <input type="url" id="music-input" class="music-input" placeholder="Dán link YouTube hoặc Spotify..." inputmode="url" />
          <button type="button" id="music-clear" class="music-clear" title="Gỡ nhạc" aria-label="Gỡ nhạc">✕</button>
        </div>
        <div id="music-player" class="music-player" hidden></div>

        <textarea id="content" class="doc-content" placeholder="Bắt đầu viết..."></textarea>
      </div>
    </div>
  </main>

  <!-- Xem ảnh phóng to: bấm vào ảnh để mở, bấm nền/✕ hoặc Esc để đóng -->
  <div id="lightbox" class="lightbox" hidden>
    <button type="button" id="lightbox-close" class="lightbox-close" aria-label="Đóng">✕</button>
    <img id="lightbox-img" class="lightbox-img" alt="Xem ảnh" />
  </div>

  <!-- Chia sẻ ghi chú: thêm/gỡ user được xem & sửa note hiện tại -->
  <div id="share-modal" class="share-modal" hidden>
    <div class="share-modal-card" role="dialog" aria-modal="true" aria-label="Chia sẻ ghi chú">
      <button type="button" id="share-modal-close" class="share-modal-close" aria-label="Đóng">✕</button>
      <h3 class="share-modal-title">👥 Chia sẻ ghi chú</h3>
      <p class="share-modal-hint">Người được chia sẻ có thể <b>xem và sửa</b> ghi chú này (không xóa được).</p>
      <div class="share-add">
        <input type="text" id="share-input" class="share-input" placeholder="Nhập tài khoản hoặc email..."
               autocapitalize="none" spellcheck="false" />
        <button type="button" id="share-add-btn" class="share-add-btn">Thêm</button>
      </div>
      <div id="share-msg" class="share-msg"></div>
      <ul id="share-list" class="share-list"></ul>
    </div>
  </div>

  <!-- Trang phát nhạc: bấm ▶ ở danh sách ghi chú để mở trình phát toàn màn hình -->
  <div id="music-modal" class="music-modal" hidden>
    <div class="music-modal-card" role="dialog" aria-modal="true" aria-label="Trình phát nhạc">
      <button type="button" id="music-modal-close" class="music-modal-close" aria-label="Đóng">✕</button>
      <div class="music-modal-head">
        <span class="music-modal-eyebrow">♪ ĐANG PHÁT</span>
        <h3 id="music-modal-title" class="music-modal-title"></h3>
      </div>
      <div id="music-modal-body" class="music-modal-body"></div>
    </div>
  </div>

  <script src="/app.js?v=__V__"></script>
</body>
</html>

# Mẫu cấu hình Nginx reverse proxy cho app Notebook.
# Đổi yourdomain.com thành tên miền thật. Certbot sẽ tự thêm khối SSL (443).

server {
    listen 80;
    server_name yourdomain.com;

    # Giới hạn kích thước body (entry nhật ký không cần lớn)
    client_max_body_size 2M;

    # Nén để giảm băng thông / tải CPU phía client
    gzip on;
    gzip_types text/css application/javascript application/json text/plain;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

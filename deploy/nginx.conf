# Mẫu cấu hình Nginx reverse proxy cho app Notebook.
# Đổi yourdomain.com thành tên miền thật. Certbot sẽ tự thêm khối SSL (443).

server {
    listen 80;
    server_name yourdomain.com;

    # Cho phép upload ảnh từ điện thoại (giới hạn app là 12MB; đặt cao hơn để app
    # tự trả lỗi JSON thân thiện thay vì nginx trả trang HTML 413).
    client_max_body_size 15M;

    # Nén để giảm băng thông / tải CPU phía client
    gzip on;
    gzip_types text/css application/javascript application/json text/plain image/svg+xml;

    # Ảnh đã upload: cache lâu cho nhẹ server (file có tên duy nhất theo timestamp)
    location /uploads/ {
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
